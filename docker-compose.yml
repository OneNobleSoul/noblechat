  provider-1:
    image: noblechat:local
    container_name: nc-provider-1
    command: ["node", "apps/node/node.js"]
    restart: unless-stopped
    environment:
      NODE_LABEL: "provider-1"
      NET_SEED: ${NET_SEED}
      INTERNAL_TOKEN: ${INTERNAL_TOKEN}
      GATEWAY_URL: "http://noblechat:8790"
      MEAN_DELAY_MS: "60"
      LAYERS: "3"
