services:
  db:
    image: postgres:16-alpine
    container_name: noblechat-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - noblechat-db:/var/lib/postgresql/data
    networks:
      - noblechat_internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 12

  noblechat:
    build: .
    image: noblechat:local
    container_name: noblechat
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT: "8790"
      MEAN_DELAY_MS: "60"
      NET_SEED: ${NET_SEED}
      DATABASE_URL: ${DATABASE_URL}
      ADMIN_TOKEN: ${ADMIN_TOKEN}
      INTERNAL_TOKEN: ${INTERNAL_TOKEN}
      LAYERS: "3"
      PER_LAYER: "2"
      PROVIDERS: "2"
      MIX_PORT: "8890"
      NYM_CLIENT_URL: ${NYM_CLIENT_URL:-}
      TURN_SHARED_SECRET: ${TURN_SHARED_SECRET:-}
      TURN_URIS: ${TURN_URIS:-}
    expose:
      - "8790"
    networks:
      - jarvis20_default
      - noblechat_internal

  # Optional sidecar holding our identity on the public Nym mixnet. Only the
  # gateway talks to it (internal network, nothing published). Enable the nym
  # transport in the admin panel once this is up and connected.
  nym-client:
    build: deploy/nym
    container_name: nc-nym-client
    restart: unless-stopped
    # The nym-client only accepts ONE websocket client (the gateway) and needs
    # to flush its reply-SURB store on shutdown, or it comes back with corrupt
    # state that silently breaks receiving. So: no port-poking healthcheck
    # (it tripped "duplicate connection" every interval), and a long stop grace
    # so a redeploy lets it shut down cleanly instead of being killed mid-flush.
    stop_grace_period: 60s
    volumes:
      - nym-client-data:/root/.nym
    expose:
      - "1977"
    networks:
      - noblechat_internal

  mix-l0-0:
    image: noblechat:local
    container_name: nc-mix-l0-0
    command: ["node", "apps/node/node.js"]
    restart: unless-stopped
    environment:
      NODE_LABEL: "mix-L0-0"
      NET_SEED: ${NET_SEED}
      INTERNAL_TOKEN: ${INTERNAL_TOKEN}
      GATEWAY_URL: "http://noblechat:8790"
      MEAN_DELAY_MS: "60"
      LAYERS: "3"
      PER_LAYER: "2"
      PROVIDERS: "2"
      PORT: "8890"
    networks:
      - noblechat_internal
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:8890/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 20s
      timeout: 5s
      retries: 5

  mix-l0-1:
    image: noblechat:local
    container_name: nc-mix-l0-1
    command: ["node", "apps/node/node.js"]
    restart: unless-stopped
    environment:
      NODE_LABEL: "mix-L0-1"
      NET_SEED: ${NET_SEED}
      INTERNAL_TOKEN: ${INTERNAL_TOKEN}
      GATEWAY_URL: "http://noblechat:8790"
      MEAN_DELAY_MS: "60"
      LAYERS: "3"
      PER_LAYER: "2"
      PROVIDERS: "2"
      PORT: "8890"
    networks:
      - noblechat_internal
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:8890/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
