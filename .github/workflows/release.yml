name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  desktop:
    name: desktop (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: build installer
        working-directory: clients/desktop
        run: |
          npm install
          npm run dist
      - name: publish to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          files: |
            clients/desktop/dist/*.AppImage
            clients/desktop/dist/*.dmg
            clients/desktop/dist/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  android:
    name: android apk
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17
      - name: build apk
        working-directory: clients/mobile
        run: |
          npm install
          npx cap add android
          cd android && ./gradlew assembleDebug
          cp app/build/outputs/apk/debug/app-debug.apk ../noblechat-android.apk
      - name: publish to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          files: clients/mobile/noblechat-android.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
